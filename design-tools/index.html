<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,html[data-theme="dark"]{
  --bg:#0a0a0c;
  --surface:#141416;
  --border:#222228;
  --text:#e0e0e0;
  --text2:#888;
  --text3:#555;
  --radius:10px;
  --hover-text:#fff;
  color-scheme:dark;
}
html[data-theme="light"]{
  --bg:#f6f1eb;
  --surface:#ece5dc;
  --border:#ddd5cb;
  --text:#2a2420;
  --text2:#6b5e53;
  --text3:#a89888;
  --hover-text:#1a1410;
  color-scheme:light;
}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  transition:background 0.35s ease,color 0.35s ease;
}
*{transition-property:color,background,border-color,opacity,filter,box-shadow;transition-duration:0.35s;transition-timing-function:ease}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* Header */
header{
  padding:28px 0 34px;
  display:flex;
  align-items:center;
  gap:16px;
}
header h1{
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--text);
  white-space:nowrap;
}
.search-wrap{
  position:relative;
  display:flex;
  align-items:center;
}
.search-field{
  width:160px;
  padding:6px 48px 6px 10px;
  background:var(--surface);
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:12px;
  color:var(--text);
  outline:none;
  transition:width 0.3s, background 0.35s ease, color 0.35s ease;
}
.search-field:focus{
  width:220px;
}
.search-field::placeholder{color:var(--text3)}
.search-shortcut{
  position:absolute;
  right:8px;
  font-size:10px;
  color:var(--text3);
  pointer-events:none;
  display:flex;
  gap:2px;
  transition:opacity 0.15s;
}
.search-field:focus ~ .search-shortcut{
  opacity:0;
}
.search-shortcut kbd{
  background:var(--border);
  padding:1px 5px;
  border-radius:3px;
  font-family:inherit;
  font-size:9px;
  color:var(--text2);
}

/* Dimmed state for non-matching tools */
.tool-card{
  transition:opacity 0.25s ease;
}
.tool-card.dimmed{
  opacity:0.12;
  pointer-events:none;
}
.category.all-dimmed .category-title{
  opacity:0.12;
  transition:opacity 0.25s ease;
}

/* Idea generator */
.idea{
  display:flex;
  align-items:flex-start;
  gap:8px;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  padding:28px 0 40px 0;
  line-height:1.5;
  max-width:700px;
  position:relative;
  isolation:isolate;
  background:var(--bg);
}
.idea-gem{
  width:38px;
  height:38px;
  flex-shrink:0;
  object-fit:cover;
  border-radius:3px;
  transition:opacity 0.35s ease;
  position:absolute;
}
.gem-dark{mix-blend-mode:screen;opacity:1;filter:contrast(1.4) brightness(1.05) blur(0.02px);margin-top:-4px;pointer-events:auto}
.gem-light{mix-blend-mode:darken;opacity:0;width:53px;height:53px;margin-left:-3px;margin-top:-7px;filter:brightness(1.02) blur(0.02px);clip-path:inset(2% 2% 2% 10%);pointer-events:none}
html[data-theme="light"] .gem-dark{opacity:0;pointer-events:none}
html[data-theme="light"] .gem-light{opacity:1;pointer-events:auto}
.idea-gem{cursor:pointer;transition:opacity 0.35s ease,transform 0.15s ease}
.idea-gem:hover{transform:scale(1.1)}
.idea-gem:active{transform:scale(0.9)}
#idea{transition:opacity 0.25s ease}
html[data-theme="light"] .gem-dark{opacity:0}
html[data-theme="light"] .gem-light{opacity:1}
#idea{padding-left:46px}

/* Category row */
.category{
  display:flex;
  gap:0;
  padding:0;
  margin-bottom:14px;
}
.category-title{
  width:140px;
  flex-shrink:0;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  padding-top:4px;
}

/* Tools inline flow */
.tools-grid{
  display:flex;
  flex-wrap:wrap;
  gap:1px 14px;
  flex:1;
  align-items:center;
}

.tool-card{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:2px 0;
  text-decoration:none;
  color:var(--text2);
  transition:color 0.1s;
}
.tool-card:hover{color:var(--hover-text)}

/* Tooltip (desktop only) */
.tooltip{
  position:fixed;
  pointer-events:none;
  opacity:0;
  z-index:1000;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 13px;
  max-width:300px;
  font-size:13px;
  line-height:1.5;
  color:var(--text2);
  transition:opacity 0.15s ease;
  box-shadow:0 4px 16px rgba(0,0,0,0.25);
}
.tooltip.visible{opacity:1}
.tooltip .tt-desc{color:var(--text);display:block;margin-bottom:12px}
.tooltip .tt-meta{display:flex;gap:5px;flex-wrap:wrap}
.tooltip .tt-badge{
  font-size:10px;
  color:var(--text2);
  background:var(--border);
  border-radius:4px;
  padding:2px 7px;
  white-space:nowrap;
}

.tool-favicon{
  width:14px;
  height:14px;
  border-radius:2px;
  flex-shrink:0;
  object-fit:contain;
}
.tool-favicon.invert-dark{
  filter:invert(1) brightness(2);
}
html[data-theme="light"] .tool-favicon.invert-dark{
  filter:none;
}

.tool-name{
  font-size:13px;
  font-weight:400;
}


/* Theme toggle */
.theme-toggle{
  display:flex;
  align-items:center;
  gap:2px;
  background:var(--surface);
  border-radius:8px;
  padding:2px;
  margin-left:auto;
}
.theme-btn{
  background:none;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  font-family:inherit;
  font-size:11px;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.15s;
}
.theme-btn:hover{color:var(--text2)}
.theme-btn.active{
  background:var(--border);
  color:var(--text);
}

/* Footer */
footer{
  text-align:left;
  margin-top:auto;
  padding-bottom:28px;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  mix-blend-mode:difference;
}

/* Section hover dimming (desktop only) */
@media(min-width:641px){
  main .category{
    transition:opacity 0.3s ease;
  }
  main.has-hover .category{
    opacity:0.15;
  }
  main.has-hover .category.hovered{
    opacity:1;
  }
}

/* Scale up 20% for large displays (2560×1440+) */
@media(min-width:2200px){
  .container{max-width:1320px}
  header h1{font-size:19px}
  .search-field{width:192px;padding:7px 58px 7px 12px;font-size:14px;border-radius:10px}
  .search-field:focus{width:264px}
  .search-shortcut{font-size:12px}
  .search-shortcut kbd{font-size:11px;padding:2px 6px}
  .category{margin-bottom:17px}
  .category-title{width:168px;font-size:14px}
  .tools-grid{gap:1px 17px}
  .tool-card{gap:6px;padding:3px 0}
  .tool-favicon{width:17px;height:17px}
  .tool-name{font-size:16px}
  .theme-btn{font-size:13px;padding:6px 10px}
  footer{font-size:14px;padding:24px 0 38px}
  header{padding:34px 0 41px;gap:19px}
}

/* Effect canvas — bottom only, not full viewport */
.shader-wrap{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:38vh;
  pointer-events:none;
  z-index:2;
}
.shader-wrap canvas{
  display:block;
  width:100%;
  height:100%;
}
.container{position:relative;z-index:1}

/* Shader glow — CSS handles both themes */
.shader-wrap{mix-blend-mode:screen;filter:blur(4px)}
html[data-theme="light"] .shader-wrap{
  mix-blend-mode:multiply;
  filter:blur(4px) invert(1) hue-rotate(180deg) saturate(1.4) contrast(1.3);
}

@media(max-width:640px){
  .container{padding:0 16px}
  header{flex-wrap:wrap;gap:10px;padding:20px 0 24px}
  header h1{width:100%;margin-bottom:2px}
  .search-field{width:120px;font-size:13px}
  .search-field:focus{width:160px}
  .search-shortcut{display:none}
  .category{flex-direction:column;gap:4px}
  .category-title{width:auto}
  .shader-wrap{position:relative;height:200px}
}
</style>
</head>

      sf.value = '';

if (window.matchMedia('(min-width:641px)').matches) {
  const tip = document.createElement('div');
  tip.className = 'tooltip';
  document.body.appendChild(tip);
  let timer = null;

  document.addEventListener('mouseover', e => {
    const card = e.target.closest('.tool-card');
    if (!card || !card.dataset.d) { clearTimeout(timer); tip.classList.remove('visible'); return; }
    clearTimeout(timer);
    timer = setTimeout(() => {
      const badges = card.dataset.p.split(' · ').map(b => `<span class="tt-badge">${b}</span>`).join('');
      tip.innerHTML = `<span class="tt-desc">${card.dataset.d}</span><span class="tt-meta">${badges}</span>`;
      const r = card.getBoundingClientRect();
      let x = r.left;
      let y = r.bottom + 6;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
      tip.classList.add('visible');
      // Keep tooltip in viewport
      requestAnimationFrame(() => {
        const tr = tip.getBoundingClientRect();
        if (tr.right > window.innerWidth - 12) tip.style.left = (window.innerWidth - tr.width - 12) + 'px';
        if (tr.bottom > window.innerHeight - 12) { tip.style.top = (r.top - tr.height - 6) + 'px'; }
      });
    }, 400);
  });

  document.addEventListener('mouseout', e => {
    const card = e.target.closest('.tool-card');
    if (card) { clearTimeout(timer); tip.classList.remove('visible'); }
  });
}




function onSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.category').forEach(cat => {
    const catName = cat.querySelector('.category-title').textContent.toLowerCase();
    const catMatch = q && catName.includes(q);
    const cards = cat.querySelectorAll('.tool-card');
    let anyVisible = false;
    cards.forEach(card => {
      const name = card.querySelector('.tool-name').textContent.toLowerCase();
      const match = !q || name.includes(q) || catMatch;
      card.classList.toggle('dimmed', !match);
      if (match) anyVisible = true;
    });
    cat.classList.toggle('all-dimmed', !anyVisible && !!q);
  });
}

<script>
// ============================
// Raw WebGL — Stripe + Custom Bloom Pipeline
// Zero dependencies. CSS screen blend for theme.
// ============================
(function(){
const canvas = document.getElementById('shaderCanvas');
let gl = canvas.getContext('webgl2', {alpha:false});
if(!gl){console.warn('No WebGL2');return;}
gl.getExtension('EXT_color_buffer_half_float');
gl.getExtension('EXT_color_buffer_float');
const wrap = document.getElementById('shaderWrap');

let seed = Math.random()*100;
window._shaderNewSeed = () => { seed = Math.random()*100; };

// --- Compile helper with error logging ---
function mkProg(vs, fs){
  const p=gl.createProgram();
  [gl.VERTEX_SHADER,gl.FRAGMENT_SHADER].forEach((t,i)=>{
    const s=gl.createShader(t); gl.shaderSource(s,[vs,fs][i]); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) console.error('Shader compile:',gl.getShaderInfoLog(s));
    gl.attachShader(p,s);
  });
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)) console.error('Program link:',gl.getProgramInfoLog(p));
  return p;
}

// --- Full-screen quad ---
const quadBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
function drawQuad(){
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
  gl.enableVertexAttribArray(0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// --- FBO helper (half-float for HDR) ---
function mkFBO(w,h){
  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.HALF_FLOAT,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fb=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  const status=gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  if(status!==gl.FRAMEBUFFER_COMPLETE) console.error('FBO incomplete:',status);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return {fb,tex,w,h};
}

const VS=`#version 300 es
layout(location=0) in vec2 a_pos;out vec2 vUv;
void main(){vUv=a_pos*.5+.5;gl_Position=vec4(a_pos,0,1);}`;

// === GLOW SHADER — the stripe ===
const glowProg = mkProg(VS, `#version 300 es
precision highp float;
in vec2 vUv;out vec4 fragColor;
uniform float u_time,u_seed,u_aspect;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);f=f*f*f*(f*(f*6.-15.)+10.);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}
float fbm(vec2 p){float v=0.,a=.5;mat2 r=mat2(.8,.6,-.6,.8);
  for(int i=0;i<3;i++){v+=a*noise(p);p=r*p*2.;a*=.5;}return v;}

void main(){
  // Early-out: skip expensive noise for pixels above visible glow
  if(vUv.y>.75){fragColor=vec4(0,0,0,1);return;}

  float T=u_time,s=u_seed;

  // Palettes
  int idx=int(mod(floor(s*3.7),7.));
  vec3 cCore;
  if(idx==0) cCore=vec3(.85,.95,1.);
  else if(idx==1) cCore=vec3(1.,.85,.95);
  else if(idx==2) cCore=vec3(1.,.95,.8);
  else if(idx==3) cCore=vec3(.9,.85,1.);
  else if(idx==4) cCore=vec3(.8,1.,.95);
  else if(idx==5) cCore=vec3(1.,1.,.9);
  else cCore=vec3(.9,1.,.9);

  vec3 cA,cB;
  if(idx==0){cA=vec3(.85,.12,.5);cB=vec3(.08,.6,.85);}       // magenta → teal
  else if(idx==1){cA=vec3(.95,.65,.1);cB=vec3(.3,.08,.7);}    // amber → violet
  else if(idx==2){cA=vec3(.95,.3,.25);cB=vec3(.06,.15,.55);}  // coral → navy
  else if(idx==3){cA=vec3(.15,.4,1.);cB=vec3(.9,.15,.55);}    // electric blue → hot pink
  else if(idx==4){cA=vec3(.1,.75,.4);cB=vec3(.85,.35,.08);}   // emerald → burnt orange
  else if(idx==5){cA=vec3(.95,.6,.45);cB=vec3(.12,.1,.55);}   // peach → indigo
  else{cA=vec3(.1,.8,.75);cB=vec3(.65,.05,.3);}               // turquoise → ruby

  // Breathing
  float phase=fract(T*.125);
  float breath=smoothstep(0.,.35,phase)-smoothstep(.45,.85,phase);
  float bR=1.+breath*.06,bB=1.+breath*.18;

  // Stripe distance — single wave (CSS blur hides fine detail)
  float wave=fbm(vec2(vUv.x*3.+T*.2+s,T*.15+s))*.025;
  float d=(vUv.y+wave)*15./bR;

  // HDR glow layers
  float core=exp(-d*d*600.)*8.+exp(-d*d*150.)*4.;
  float inner=exp(-d*d*40.)*2.5;
  float mid=exp(-d*d*10.)*1.2;
  float outer=exp(-d*d*3.)*.4;

  // Rays — single FBM layer (CSS blur smooths the rest)
  float rayN=fbm(vec2(vUv.x*48.+T*.35+s,vUv.y*3.));
  float rayMask=smoothstep(0.,.04,d)*smoothstep(.3,.08,d);
  float rays=rayN*rayMask*2.*bB;

  // Horizontal squeeze (no FBM hotspots — CSS blur hides them)
  float hx=(vUv.x-.5)*u_aspect;
  float hBright=.1+.9*exp(-hx*hx*4.8);

  // Two-color gradient with animated noise boundary
  float xn=vUv.x+fbm(vec2(vUv.x*3.+T*.3+s,T*.2))*.18;
  vec3 cBlend=mix(cA,cB,smoothstep(.2,.8,xn));

  // Compose — keep colors pure, no black gaps
  float totalGlow=outer+mid+inner+rays+core;
  // Color blend: weighted by layer, core pushes toward white
  vec3 colTint=cBlend*(outer+mid+inner+rays)+mix(vec3(1.),cCore,.12)*core;
  // Normalize to keep color saturated, then multiply by intensity
  vec3 pureColor=totalGlow>.001 ? colTint/totalGlow : vec3(0.);
  // Boost saturation to avoid washed-out midtones
  float lum=dot(pureColor,vec3(.299,.587,.114));
  pureColor=mix(vec3(lum),pureColor,1.4);
  // Apply intensity
  vec3 col=pureColor*totalGlow;
  col*=bB*hBright;

  // Fade top
  col*=smoothstep(.7,.05,vUv.y);

  fragColor=vec4(col,1.);
}`);

// === BLUR SHADER (separable gaussian 13-tap) ===
const blurProg = mkProg(VS, `#version 300 es
precision highp float;
in vec2 vUv;out vec4 fragColor;
uniform sampler2D u_tex;
uniform vec2 u_dir;
void main(){
  vec2 ts=u_dir;
  vec3 sum=vec3(0.);
  sum+=texture(u_tex,vUv-ts*4.).rgb*.016;
  sum+=texture(u_tex,vUv-ts*3.).rgb*.054;
  sum+=texture(u_tex,vUv-ts*2.).rgb*.121;
  sum+=texture(u_tex,vUv-ts*1.).rgb*.194;
  sum+=texture(u_tex,vUv).rgb*.23;
  sum+=texture(u_tex,vUv+ts*1.).rgb*.194;
  sum+=texture(u_tex,vUv+ts*2.).rgb*.121;
  sum+=texture(u_tex,vUv+ts*3.).rgb*.054;
  sum+=texture(u_tex,vUv+ts*4.).rgb*.016;
  fragColor=vec4(sum,1.);
}`);

// === COMPOSITE SHADER (sharp + bloom + ACES) ===
const compProg = mkProg(VS, `#version 300 es
precision highp float;
in vec2 vUv;out vec4 fragColor;
uniform sampler2D u_sharp,u_bloom;
uniform float u_bloomStr;
void main(){
  vec3 s=texture(u_sharp,vUv).rgb;
  vec3 b=texture(u_bloom,vUv).rgb;
  // Chromatic aberration on bloom
  float ca=.003;
  b.r=texture(u_bloom,vUv+vec2(ca,0.)).r;
  b.b=texture(u_bloom,vUv-vec2(ca,0.)).b;
  vec3 hdr=s+b*u_bloomStr;
  // ACES
  vec3 m=(hdr*(2.51*hdr+.03))/(hdr*(2.43*hdr+.59)+.14);
  fragColor=vec4(m,1.);
}`);

// --- Uniforms ---
const gU={
  time:gl.getUniformLocation(glowProg,'u_time'),
  seed:gl.getUniformLocation(glowProg,'u_seed'),
  aspect:gl.getUniformLocation(glowProg,'u_aspect')
};
const bU={tex:gl.getUniformLocation(blurProg,'u_tex'),dir:gl.getUniformLocation(blurProg,'u_dir')};
const cU={sharp:gl.getUniformLocation(compProg,'u_sharp'),bloom:gl.getUniformLocation(compProg,'u_bloom'),str:gl.getUniformLocation(compProg,'u_bloomStr')};

// --- FBOs ---
let fboFull, fboBloomA, fboBloomB;
let W,H;

function resize(){
  const dpr=Math.min(window.devicePixelRatio,1.5);
  W=Math.round(wrap.clientWidth*dpr);
  H=Math.round(wrap.clientHeight*dpr);
  canvas.width=W; canvas.height=H;
  canvas.style.width=wrap.clientWidth+'px';
  canvas.style.height=wrap.clientHeight+'px';
  fboFull=mkFBO(W,H);
  const bw=Math.round(W/6), bh=Math.round(H/6);
  fboBloomA=mkFBO(bw,bh);
  fboBloomB=mkFBO(bw,bh);
}
resize();
window.addEventListener('resize',resize);

let lastFrame=0;
function frame(t){
  requestAnimationFrame(frame);
  if(t-lastFrame<71) return; // 14fps
  lastFrame=t;
  const T=t*.001;

  // Pass 1: Glow → FBO full
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboFull.fb);
  gl.viewport(0,0,W,H);
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(glowProg);
  gl.uniform1f(gU.time,T);
  gl.uniform1f(gU.seed,seed);
  gl.uniform1f(gU.aspect,W/H);
  drawQuad();

  // Pass 2: Downsample full → bloom A (bilinear filtering = free blur)
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboBloomA.fb);
  gl.viewport(0,0,fboBloomA.w,fboBloomA.h);
  gl.useProgram(blurProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,fboFull.tex);
  gl.uniform1i(bU.tex,0);
  gl.uniform2f(bU.dir,0,0); // no blur, just downsample
  drawQuad();

  // Pass 3: H-blur bloom A → bloom B (wide taps for big bloom)
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboBloomB.fb);
  gl.bindTexture(gl.TEXTURE_2D,fboBloomA.tex);
  gl.uniform2f(bU.dir, 2.5/fboBloomA.w, 0);
  drawQuad();

  // Pass 4: V-blur bloom B → bloom A
  gl.bindFramebuffer(gl.FRAMEBUFFER,fboBloomA.fb);
  gl.bindTexture(gl.TEXTURE_2D,fboBloomB.tex);
  gl.uniform2f(bU.dir, 0, 2.5/fboBloomA.h);
  drawQuad();

  // Pass 5: Composite → screen
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,W,H);
  gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(compProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,fboFull.tex);
  gl.uniform1i(cU.sharp,0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D,fboBloomA.tex);
  gl.uniform1i(cU.bloom,1);
  gl.uniform1f(cU.str,1.5);
  drawQuad();
}
requestAnimationFrame(frame);
})();
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Engineer Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0c;
  --surface:#141416;
  --border:#222228;
  --text:#e0e0e0;
  --text2:#888;
  --text3:#555;
  --radius:10px;
  --new:#10b981;
}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px;
}

/* Header */
header{
  padding:28px 0 20px;
}
header h1{
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.01em;
  margin-bottom:2px;
  color:var(--text);
}
header p{
  font-size:12px;
  color:var(--text3);
  line-height:1.4;
}

/* Category row */
.category{
  display:flex;
  gap:0;
  padding:0;
  margin-bottom:14px;
}
.category-title{
  width:140px;
  flex-shrink:0;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  padding-top:1px;
}

/* Tools inline flow */
.tools-grid{
  display:flex;
  flex-wrap:wrap;
  gap:1px 14px;
  flex:1;
  align-items:center;
}

.tool-card{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:2px 0;
  text-decoration:none;
  color:var(--text2);
  transition:color 0.1s;
}
.tool-card:hover{color:#fff}

.tool-favicon{
  width:14px;
  height:14px;
  border-radius:2px;
  flex-shrink:0;
  object-fit:contain;
}
.tool-favicon.invert{
  filter:invert(1) brightness(2);
}

.tool-name{
  font-size:13px;
  font-weight:400;
}


/* Footer */
footer{
  text-align:left;
  padding:20px 0 32px;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
}

@media(max-width:640px){
  .container{padding:0 16px}
  .category{flex-direction:column;gap:4px}
  .category-title{width:auto}
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Design Engineer Tools</h1>

  <main id="main"></main>
  <footer>&copy;2026 by Orlock</footer>

function getFaviconUrl(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch { return ''; }
}

// Favicons that are dark/black and need inverting on dark backgrounds
const DARK_FAVICONS = new Set([
  'godly.website','www.bezi.com','splice.com','zed.dev',
  'www.hudsandguis.com','interfaceingame.com','www.clo3d.com',
  'www.depthkit.tv','museapp.com','tldraw.com','github.com',
  'www.sidefx.com','derivative.ca','www.theatrejs.com',
  'www.fmod.com','localsend.org','arc.net',
  'cables.gl','www.tldraw.com','excalidraw.com',
  'motion-primitives.com','www.fancycomponents.dev','lumalabs.ai',
]);

function render() {
  TOOLS.forEach(s => s.tools.sort((a,b) => a.name.localeCompare(b.name, undefined, {sensitivity:'base'})));
  const main = document.getElementById('main');
  main.innerHTML = TOOLS.map(section => `
    <div class="category">
      <div class="category-title">${section.cat}</div>
      <div class="tools-grid">
        ${section.tools.map(t => {
          let host = '';
          try { host = new URL(t.url).hostname; } catch {}
          const inv = DARK_FAVICONS.has(host) ? ' invert' : '';
          return `<a class="tool-card" href="${t.url}" target="_blank" rel="noopener">
            <img class="tool-favicon${inv}" src="${getFaviconUrl(t.url)}" alt="" loading="lazy" onerror="this.style.display='none'">
            <span class="tool-name">${t.name}</span>
          </a>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

render();

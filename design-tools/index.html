<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Engineer Tools</title>
<meta property="og:title" content="Design Engineer Tools.">
<meta property="og:description" content="A curated list of tools for web-focused design engineers.">
<meta property="og:image" content="https://nikitapoloznikov.github.io/orlock/design-tools/og.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Design Engineer Tools.">
<meta name="twitter:description" content="A curated list of tools for web-focused design engineers.">
<meta name="twitter:image" content="https://nikitapoloznikov.github.io/orlock/design-tools/og.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,html[data-theme="dark"]{
  --bg:#0a0a0c;
  --surface:#141416;
  --border:#222228;
  --text:#e0e0e0;
  --text2:#888;
  --text3:#555;
  --radius:10px;
  --hover-text:#fff;
  color-scheme:dark;
}
html[data-theme="light"]{
  --bg:#f5f5f3;
  --surface:#e8e8e5;
  --border:#ddd;
  --text:#111;
  --text2:#555;
  --text3:#999;
  --hover-text:#000;
  color-scheme:light;
}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  transition:background 0.35s ease,color 0.35s ease;
}
*{transition-property:color,background,border-color,opacity,filter,box-shadow;transition-duration:0.35s;transition-timing-function:ease}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px;
}

/* Header */
header{
  padding:28px 0 20px;
  display:flex;
  align-items:center;
  gap:16px;
}
header h1{
  font-size:16px;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--text);
  white-space:nowrap;
}
.search-wrap{
  position:relative;
  display:flex;
  align-items:center;
  margin-left:auto;
}
.search-field{
  width:160px;
  padding:6px 48px 6px 10px;
  background:var(--surface);
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:12px;
  color:var(--text);
  outline:none;
  transition:width 0.3s, background 0.35s ease, color 0.35s ease;
}
.search-field:focus{
  width:220px;
}
.search-field::placeholder{color:var(--text3)}
.search-shortcut{
  position:absolute;
  right:8px;
  font-size:10px;
  color:var(--text3);
  pointer-events:none;
  display:flex;
  gap:2px;
  transition:opacity 0.15s;
}
.search-field:focus ~ .search-shortcut{
  opacity:0;
}
.search-shortcut kbd{
  background:var(--border);
  padding:1px 5px;
  border-radius:3px;
  font-family:inherit;
  font-size:9px;
  color:var(--text2);
}

/* Dimmed state for non-matching tools */
.tool-card{
  transition:opacity 0.25s ease;
}
.tool-card.dimmed{
  opacity:0.12;
  pointer-events:none;
}
.category.all-dimmed .category-title{
  opacity:0.12;
  transition:opacity 0.25s ease;
}

/* Category row */
.category{
  display:flex;
  gap:0;
  padding:0;
  margin-bottom:14px;
}
.category-title{
  width:140px;
  flex-shrink:0;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
  padding-top:1px;
}

/* Tools inline flow */
.tools-grid{
  display:flex;
  flex-wrap:wrap;
  gap:1px 14px;
  flex:1;
  align-items:center;
}

.tool-card{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:2px 0;
  text-decoration:none;
  color:var(--text2);
  transition:color 0.1s;
}
.tool-card:hover{color:var(--hover-text)}

.tool-favicon{
  width:14px;
  height:14px;
  border-radius:2px;
  flex-shrink:0;
  object-fit:contain;
}
.tool-favicon.invert-dark{
  filter:invert(1) brightness(2);
}
html[data-theme="light"] .tool-favicon.invert-dark{
  filter:none;
}
html[data-theme="light"] .tool-favicon.invert-light{
  filter:invert(1) brightness(0.5);
}

.tool-name{
  font-size:13px;
  font-weight:400;
}


/* Theme toggle */
.theme-toggle{
  display:flex;
  align-items:center;
  gap:2px;
  background:var(--surface);
  border-radius:8px;
  padding:2px;
}
.theme-btn{
  background:none;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  font-family:inherit;
  font-size:11px;
  color:var(--text3);
  cursor:pointer;
  transition:all 0.15s;
}
.theme-btn:hover{color:var(--text2)}
.theme-btn.active{
  background:var(--border);
  color:var(--text);
}

/* Footer */
footer{
  text-align:left;
  padding:20px 0 32px;
  font-size:12px;
  font-weight:400;
  color:var(--text3);
}

/* Section hover dimming (desktop only) */
@media(min-width:641px){
  main .category{
    transition:opacity 0.3s ease;
  }
  main.has-hover .category{
    opacity:0.15;
  }
  main.has-hover .category.hovered{
    opacity:1;
  }
}

@media(max-width:640px){
  .container{padding:0 16px}
  .category{flex-direction:column;gap:4px}
  .category-title{width:auto}
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Design Engineer Tools.</h1>
    <div class="search-wrap">
      <input type="text" class="search-field" id="searchField" placeholder="Search..." oninput="onSearch(this.value)">
      <div class="search-shortcut"><kbd>&#8984;</kbd><kbd>F</kbd></div>
    </div>
    <div class="theme-toggle">
      <button class="theme-btn active" data-theme="dark" onclick="setTheme('dark')">Dark</button>
      <button class="theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
    </div>
  </header>
  <main id="main"></main>
  <footer>&copy;2026 by Orlock</footer>
</div>

function getFaviconUrl(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch { return ''; }
}

// Favicons that are dark/black — need inverting in dark mode
const DARK_FAVICONS = new Set([
  'godly.website','www.bezi.com','splice.com','zed.dev',
  'www.hudsandguis.com','interfaceingame.com','www.clo3d.com',
  'www.depthkit.tv','museapp.com','tldraw.com','github.com',
  'www.sidefx.com','derivative.ca','www.theatrejs.com',
  'www.fmod.com','localsend.org','arc.net',
  'cables.gl','www.tldraw.com','excalidraw.com',
  'motion-primitives.com','www.fancycomponents.dev','lumalabs.ai',
  'mobbin.com','www.unrealengine.com',
  'paper.design','www.cursor.com','searchsystem.co','layers.to',
  'codeium.com','v0.dev',
]);

// Favicons that are truly white/light — need inverting in light mode only
const LIGHT_FAVICONS = new Set([
  'www.awwwards.com',
  'rive.app','nodes.io',
  'cavalry.scenegroup.co',
  'recordly.dev',
  'ray.so',
  'parsec.app','www.warp.dev',
]);

function render() {
  TOOLS.forEach(s => s.tools.sort((a,b) => a.name.localeCompare(b.name, undefined, {sensitivity:'base'})));
  const main = document.getElementById('main');
  main.innerHTML = TOOLS.map(section => `
    <div class="category">
      <div class="category-title">${section.cat}</div>
      <div class="tools-grid">
        ${section.tools.map(t => {
          let host = '';
          try { host = new URL(t.url).hostname; } catch {}
          const cls = DARK_FAVICONS.has(host) ? ' invert-dark' : LIGHT_FAVICONS.has(host) ? ' invert-light' : '';
          return `<a class="tool-card" href="${t.url}" target="_blank" rel="noopener">
            <img class="tool-favicon${cls}" src="${getFaviconUrl(t.url)}" alt="" loading="lazy" onerror="this.style.display='none'">
            <span class="tool-name">${t.name}</span>
          </a>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

render();

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('searchField').focus();
  }
  if (e.key === 'Escape') {
    const sf = document.getElementById('searchField');
    if (document.activeElement === sf) {
      sf.blur();
    }
  }
});

// Theme
function setTheme(mode) {
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === mode));
  document.documentElement.setAttribute('data-theme', mode);
  localStorage.setItem('theme', mode);
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  setTheme(saved);
})();

// Section focus on hover (title or tool only)
const mainEl = document.getElementById('main');
mainEl.addEventListener('mouseover', e => {
  const target = e.target.closest('.tool-card');
  if (!target) return;
  const cat = target.closest('.category');
  if (!cat) return;
  mainEl.classList.add('has-hover');
  mainEl.querySelectorAll('.category').forEach(c => c.classList.toggle('hovered', c === cat));
});
mainEl.addEventListener('mouseleave', () => {
  mainEl.classList.remove('has-hover');
  mainEl.querySelectorAll('.category.hovered').forEach(c => c.classList.remove('hovered'));
});
// Also clear when moving to gaps between sections
mainEl.addEventListener('mouseout', e => {
  if (!e.relatedTarget || !e.relatedTarget.closest('.tool-card')) {
    if (!e.relatedTarget || !e.relatedTarget.closest('.category')) {
      mainEl.classList.remove('has-hover');
      mainEl.querySelectorAll('.category.hovered').forEach(c => c.classList.remove('hovered'));
    }
  }
});

function onSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.category').forEach(cat => {
    const cards = cat.querySelectorAll('.tool-card');
    let anyVisible = false;
    cards.forEach(card => {
      const name = card.querySelector('.tool-name').textContent.toLowerCase();
      const match = !q || name.includes(q);
      card.classList.toggle('dimmed', !match);
      if (match) anyVisible = true;
    });
    cat.classList.toggle('all-dimmed', !anyVisible && !!q);
  });
}
</script>
